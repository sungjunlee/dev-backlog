name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node tests
        run: node --test skills/dev-backlog/scripts/*.test.js

      - name: Bash smoke tests
        run: bash skills/dev-backlog/scripts/smoke-test.sh
